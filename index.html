<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Association Tracker</title>
    <script>
        (function(w,d,t,u,n,a,m){
            w['MauticTrackingObject']=n;
            w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)};
            a=d.createElement(t),
            m=d.getElementsByTagName(t)[0];
            a.async=1;
            a.src=u;
            
            // Wait for script to load before sending complex events
            a.onload = function() {
                // 1. Send the Pageview with User Identification
                mt('send', 'pageview', {
                    email: 'thisistest@example.com',
                    field2: 'val'
                });

                // 2. Send the Custom Event (This will now have data)
                mt('send', 'event', {
                    category: 'Content',
                    action:   'Article Read',
                    label:    'Labor Cost Trends 2025' // Use 'label' instead of 'name' for standard event tracking
                });
            };
            
            m.parentNode.insertBefore(a,m);
        })(window,document,'script','https://d2.altametrics.com/mtc.js','mt');
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>Event Dispatched</h2>
        <p>Sending tracking data for <strong>Labor Cost Trends 2025</strong> to Mautic...</p>
    </div>
</body>
</html>
