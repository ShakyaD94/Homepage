<!DOCTYPE html>
<html>
<head>
    <title>GitLab to Mautic Event Tracker</title>

    <!-- Mautic Tracking Script -->
    <script>
    (function(w,d,t,u,n,a,m){
        w['MauticTrackingObject']=n;
        w[n]=w[n]||function(){
            (w[n].q=w[n].q||[]).push(arguments)
        };

        a=d.createElement(t),
        m=d.getElementsByTagName(t)[0];

        a.async=1;
        a.src=u;

        a.onload = function() {

            // Send custom event
            mt('send', 'event', {
                category: 'Content',
                action: 'Article Read',
                label: 'Labor Cost Trends 2025'
            });

            // Send pageview with contact fields
            mt('send', 'pageview', {
                email: 'thisistest@example.com',
                field2: 'val'
            });

            console.log('Mautic event sent');
        };

        m.parentNode.insertBefore(a,m);

    })(window,document,'script','https://d2.altametrics.com/mtc.js','mt');
    </script>

</head>

<body>
    <div style="text-align:center; margin-top:50px; font-family:sans-serif;">
        <h2>Event Sent!</h2>
        <p>
            The "Article Read" event for
            <strong>Labor Cost Trends 2025</strong>
            has been dispatched to Mautic.
        </p>
    </div>
</body>
</html>
